AWSTemplateFormatVersion: '2010-09-09'

# NOTE: deliberately NO SAM transform.
# We tried `Transform: AWS::Serverless-2016-10-09` for the slice-2 Lambda, but
# every deploy failed at change-set creation with:
#   user/Shina is not authorized to perform: cloudformation:CreateChangeSet on
#   arn:aws:cloudformation:eu-west-2:aws:transform/Serverless-2016-10-09
# This held even though the user has AdministratorAccess AND an explicit inline
# Allow for exactly that action + transform ARN, with no permissions boundary
# and no Organizations SCP. Both the IAM policy simulator and the live engine
# denied it - an account-specific anomaly we could not clear from the IAM side.
# So slice 2, like slice 1, uses PLAIN CloudFormation: the function below is a
# raw AWS::Lambda::Function and its code is uploaded with `aws cloudformation
# package` (which needs no macro, hence no CreateChangeSet-on-transform check).
# See the README "Build status" section for the full story.

Description: >
  AI Discharge Summary Assistant - Phase 2 (slices 1-4b). Hash-only DynamoDB
  audit + CMK (slice 1); Bedrock-calling generate worker with least-privilege
  IAM (slice 2); DynamoDB Streams -> S3 Object Lock WORM tamper-evidence
  ledger (slice 3); Cognito + HTTP API + native JWT authoriser (slice 4a);
  async 202+poll pattern (slice 4b, ADR-005) - dispatcher Lambda + status
  Lambda + transient ResultsTable (24h TTL) + client-supplied
  Idempotency-Key, which removes the 30s API Gateway timeout and the slice-4a
  ghost-record retry hazard. No PHI in the audit log or in CloudWatch -
  hashes, ids, and operational metadata only. Full design in docs/ADR-phase1.md.

# -----------------------------------------------------------------------------
# Parameters let one template serve multiple environments without code changes.
# (SAA: parameters are how a single CloudFormation template stays reusable.)
# -----------------------------------------------------------------------------
Parameters:
  Environment:
    Type: String
    Default: demo
    AllowedValues:
      - demo
      - prod
    Description: Deployment environment - drives naming and (later) WORM retention.

  ModelId:
    Type: String
    Default: anthropic.claude-sonnet-4-6
    Description: >
      Bedrock foundation-model id, pinned per ADR-001. On-demand in eu-west-2
      (ADR-003 rule 1 - both data-at-rest AND inference stay UK-only). This single
      value is used twice: passed to the handler as BEDROCK_MODEL_ID, AND used to
      build the model ARN that scopes the bedrock:InvokeModel permission, so the
      function can invoke this model and no other.

  PatientV2SecondPass:
    Type: String
    Default: 'off'
    AllowedValues:
      - 'off'
      - 'on'
    Description: >
      Patient v2 (ADR-005 future-enhancement, see docs/PATIENT_V2_DESIGN.md). When
      'on', the worker regenerates the patient version (PART C) in a SEPARATE Bedrock
      pass whose only input is the curated PART A summary - architectural belt-and-braces
      against model-added clinical advice (Run 4 / Ibrahim). Default 'off' keeps the
      single combined-call v1 hot path bit-identical. The second pass uses the SAME
      pinned ModelId, on-demand in eu-west-2 (ADR-003 rule 1 - UK-only inference).

  LedgerRetentionDays:
    Type: Number
    Default: 1
    MinValue: 1
    Description: >
      S3 Object Lock DEFAULT retention, in days, applied to every object written
      to the WORM ledger (slice 3). Demo uses 1 day (immutable but no long-term
      storage lock-in). For prod, pass an NHS-required retention (e.g. years) -
      and note that in prod the lock is COMPLIANCE mode (see the IsProd condition),
      so objects are undeletable even by the account root until the period lapses.

  # --- Wave 3: synthetic-traffic canary (docs/WAVE3_SYNTHETIC_TRAFFIC_DESIGN.md) -
  CanaryEnabled:
    Type: String
    Default: 'off'
    AllowedValues:
      - 'off'
      - 'on'
    Description: >
      Gates the EventBridge Scheduler that fires the canary nightly. Keep 'off'
      until the synthetic Cognito user + SSM password parameter are bootstrapped
      (see infra/CANARY_BOOTSTRAP.md), then redeploy with 'on'. The Lambda + role
      are created either way so the function can be invoked manually for a smoke
      test before the schedule is switched on.

  CanaryUsername:
    Type: String
    Default: canary@synthetic.invalid
    Description: >
      Username (email) of the dedicated synthetic Cognito user the canary signs in
      as. Admin-created, no MFA, permanent password - isolated from real demo users
      so its traffic is taggable and its blast radius is nil.

  CanaryPasswordParamName:
    Type: String
    Default: /discharge/canary/password
    Description: >
      Name of the SSM Parameter Store SecureString holding the synthetic user's
      password. Created out-of-band (plain CloudFormation cannot author a
      SecureString value) per the bootstrap runbook; the canary role is granted
      GetParameter on exactly this parameter ARN.

  CanaryScheduleExpression:
    Type: String
    Default: cron(0 2 * * ? *)
    Description: >
      EventBridge Scheduler expression for the nightly canary run (interpreted in
      Europe/London - see the schedule's ScheduleExpressionTimezone). Default =
      02:00 local.

  CanaryMaxConcurrency:
    Type: String
    Default: '2'
    Description: >
      Max in-flight generations the canary keeps open at once. Tuned DOWN to live
      within the account's Bedrock Sonnet on-demand quota - the 2026-05-30 finding
      was that 5+ concurrent (x2 Bedrock calls each under Patient v2) saturates the
      quota and jobs crawl. Raise this once a Bedrock quota increase is granted.

  CanaryScenarios:
    Type: String
    Default: ''
    Description: >
      Comma-separated scenario ids to run (e.g. "S1,S8,S14,S16,S17,A5"). Empty =
      all 18. Use a rotating subset if the full set can't finish within the poll
      budget under the current quota.

  CanaryPollTimeoutS:
    Type: String
    Default: '840'
    Description: >
      Per-run poll budget in seconds (must be < the canary Lambda's 900s timeout).
      Headroom for several waves of generations under bounded concurrency.

# -----------------------------------------------------------------------------
# Conditions let one template behave differently per environment. Here the only
# difference that matters for safety is the Object Lock MODE:
#   - demo  -> GOVERNANCE (a principal holding s3:BypassGovernanceRetention can
#              still delete early - convenient for tearing a demo down);
#   - prod  -> COMPLIANCE (no one, not even root, can delete before expiry -
#              the posture the THREAT_MODEL's "immutable audit log" claim needs).
# (SAA: Conditions + Fn::If are how a single template stays environment-aware.)
# -----------------------------------------------------------------------------
Conditions:
  IsProd: !Equals [!Ref Environment, prod]
  # Create the nightly canary schedule only once the synthetic user is bootstrapped.
  CanaryOn: !Equals [!Ref CanaryEnabled, 'on']

Resources:

  # ---------------------------------------------------------------------------
  # 1) Customer-managed KMS key (CMK) for encrypting the audit table at rest.
  #
  # ADR-002 requires a CMK rather than the default AWS-owned key, because we want:
  #   - control over the key policy (who can use/manage it),
  #   - automatic annual rotation (a CMK-only feature), and
  #   - a CloudTrail record of every encrypt/decrypt call (auditability).
  # ---------------------------------------------------------------------------
  AuditKey:
    Type: AWS::KMS::Key
    Properties:
      Description: !Sub "CMK for the discharge-summary audit log (${Environment})"
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          # The "root" statement delegates key control to this account's IAM
          # policies. It does NOT grant anyone implicit access to the data -
          # principals still need explicit kms permissions in their own policy.
          - Sid: EnableIAMUserPermissions
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action: "kms:*"
            Resource: "*"

  # A friendly alias so we reference the key by name, not by raw key id.
  AuditKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub "alias/${AWS::StackName}-audit"
      TargetKeyId: !Ref AuditKey

  # ---------------------------------------------------------------------------
  # 2) The audit table (ADR-002): hash-only and immutable by design.
  #    PK = USER#<cognito_sub>          (partition by clinician)
  #    SK = GEN#<ISO8601_timestamp>#<ulid>  (sortable, unique per generation)
  #
  # Only the key attributes are declared below. DynamoDB is schemaless for every
  # other attribute (input_sha256, output_sha256, model_version, draft, etc.),
  # so we do NOT predeclare them - they are written at item-put time.
  # ---------------------------------------------------------------------------
  AuditTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AWS::StackName}-audit"

      # On-demand capacity: pay per request, no capacity planning. Ideal for the
      # spiky, low-volume traffic of a demo. (SAA: PAY_PER_REQUEST vs PROVISIONED.)
      BillingMode: PAY_PER_REQUEST

      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH      # partition key
        - AttributeName: SK
          KeyType: RANGE     # sort key

      # Encryption at rest with our CMK (not the default AWS-owned key).
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !Ref AuditKey

      # Point-in-Time Recovery: continuous backup, restore to any second in the
      # last 35 days. This is our OPERATIONAL RECOVERY net (per ADR-002) - it is
      # NOT the tamper-evidence control. Immutability comes from the S3 Object
      # Lock (WORM) ledger fed by the stream below, built in a later slice.
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

      # DynamoDB Streams: emits a change record on every write. A later slice
      # consumes this stream and writes each event to an S3 Object Lock bucket -
      # the append-only, tamper-evident audit ledger from ADR-002.
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES

      # Guard against accidental deletion of the whole table.
      # NOTE: to tear the stack down you must first set this to false and redeploy
      # (or disable deletion protection on the table), otherwise the delete fails.
      DeletionProtectionEnabled: true

      # TTL added in slice 4b for the IDEM# rows (the dispatcher's idempotency
      # receipts). DynamoDB only deletes items that ACTUALLY carry the `ttl`
      # attribute - the GEN# audit rows are written without it, so they never
      # expire and the hash-only audit log retains its immutability. Only the
      # idempotency receipts (which are pointers, not records of generations)
      # are subject to TTL cleanup. (SAA: per-item TTL vs table-level expiry.)
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # ---------------------------------------------------------------------------
  # 2b) Transient results table (ADR-005, slice 4b).
  #
  # The audit table is hash-only by ADR-002 - it must never carry the actual
  # output text. But the async pattern means the client POSTs, gets a 202, and
  # later GETs to fetch the text it never received synchronously. We need
  # somewhere to PARK that text between the worker finishing and the client
  # polling. This table is that buffer:
  #
  #   - PK = USER#<cognito_sub>   (so a GET cannot cross users by schema)
  #   - SK = RES#<job_id>         (one row per generation)
  #   - attrs: summary, gp_letter, patient, completed_at, ttl
  #   - 24h TTL (auto-cleanup)
  #   - SSE with the SAME CMK as the audit table
  #   - NO Streams (this is a delivery buffer, NOT part of the audit trail)
  #   - NO PITR (transient by design)
  #
  # Crucially: the system of record for "did the model run, when, for whom,
  # with what input hash" remains the AuditTable. ResultsTable can be wiped at
  # any time without losing the audit story - it would just mean clients see
  # status=expired and have to regenerate, which is the correct user-facing
  # behaviour for a 24h-old draft.
  # ---------------------------------------------------------------------------
  ResultsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AWS::StackName}-results"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !Ref AuditKey
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      # Deliberately NO StreamSpecification and NO PITR - this is a delivery
      # buffer, not a record of truth. The audit table downstream of the
      # ledger handles immutability.
      DeletionProtectionEnabled: true

  # ===========================================================================
  # SLICE 2 - the Bedrock-calling Lambda + its least-privilege execution role.
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # 3) The function's log group, declared explicitly (not auto-created).
  #
  # If we let CloudWatch auto-create the log group on first invoke, we couldn't
  # set retention or scope the role to it ahead of time. Declaring it lets us:
  #   - cap retention (logs are NOT the system of record - the audit table is),
  #   - grant the function logs perms on THIS group only (see role below).
  # The handler never logs note content, so default (AWS-managed key) log
  # encryption is acceptable; CMK-encrypting logs is a documented future
  # hardening (it needs a logs.${region}.amazonaws.com statement in the key
  # policy, out of scope for this slice).
  # ---------------------------------------------------------------------------
  GenerateFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}-generate"
      RetentionInDays: 30

  # ---------------------------------------------------------------------------
  # 4) Explicit, least-privilege execution role for the generate function.
  #
  # We write the role by hand (rather than letting SAM auto-generate one) so the
  # blast radius is visible and reviewable in the template. The function can do
  # EXACTLY four things, each scoped to a single resource ARN:
  #   a) append audit items + the one review-flag update   (no Delete, no Scan)
  #   b) use the CMK, but ONLY via DynamoDB                 (kms:ViaService guard)
  #   c) invoke ONE Bedrock model                           (the pinned Sonnet)
  #   d) write to its OWN log group                         (no logs:* wildcard)
  #
  # SAA: this is least privilege made concrete - identity-based policies whose
  # Resource is a specific ARN (never "*"), plus a condition key that narrows
  # *how* a permission may be used.
  # ---------------------------------------------------------------------------
  GenerateFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-generate-fn-role"
      # Service-to-service trust: only the Lambda service may assume this role.
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        # (a) Audit table: append + status-transition / review-transition update.
        #     Note the ABSENCE of DeleteItem / BatchWriteItem / Scan / Query -
        #     that is ADR-002's write-once-then-flip-the-review-flag contract,
        #     enforced at the IAM layer, not just in code. In slice 4b the
        #     worker also UpdateItem-s the existing pending GEN# row from the
        #     dispatcher (status=pending -> complete/failed); same action, same
        #     resource - no new permission needed.
        - PolicyName: audit-table-write
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: PutAndStatusTransitionOnly
                Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                Resource: !GetAtt AuditTable.Arn
        # (a2) Results table (slice 4b): PutItem only. The worker writes the
        #      three outputs here for the polling client to fetch. Status
        #      Lambda has the corresponding GetItem on this table; nobody has
        #      Update/Delete - the row simply ages out via TTL after 24h.
        - PolicyName: results-table-write
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: PutResultsOnly
                Effect: Allow
                Action:
                  - dynamodb:PutItem
                Resource: !GetAtt ResultsTable.Arn
        # (b) CMK - usable ONLY when the call flows through DynamoDB.
        #     DynamoDB actually performs at-rest encryption via a grant on its
        #     own behalf, so the data-plane PutItem path does not strictly need
        #     the caller to hold KMS perms. We grant tightly-scoped CMK access
        #     anyway to match ADR-002's "scoped to the CMK" intent - and the
        #     kms:ViaService condition guarantees this role can NEVER use the key
        #     for a standalone/direct KMS call, only as part of a DynamoDB
        #     request in this region. (SAA: condition keys narrow HOW, not just
        #     WHAT.)
        - PolicyName: cmk-via-dynamodb-only
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: UseCmkViaDynamoDbOnly
                Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:GenerateDataKey
                  - kms:DescribeKey
                Resource: !GetAtt AuditKey.Arn
                Condition:
                  StringEquals:
                    kms:ViaService: !Sub "dynamodb.${AWS::Region}.amazonaws.com"
        # (c) Bedrock - invoke exactly the one pinned foundation model, no other.
        #     Foundation-model ARNs have an EMPTY account field (arn:...:bedrock:
        #     region::foundation-model/...) because the models are AWS-owned.
        - PolicyName: bedrock-invoke-pinned-model
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: InvokePinnedSonnetOnly
                Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource: !Sub "arn:${AWS::Partition}:bedrock:${AWS::Region}::foundation-model/${ModelId}"
        # (d) Logs - this function's own log group, nothing else. We deliberately
        #     omit logs:CreateLogGroup because the group is created above.
        - PolicyName: own-log-group-only
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: WriteOwnLogsOnly
                Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${AWS::StackName}-generate:*"

  # ---------------------------------------------------------------------------
  # 5) The generate function itself - a plain AWS::Lambda::Function (no SAM
  #    transform; see the note at the top of this file). It reads ward-round
  #    notes from the event, calls Bedrock Converse on the pinned Sonnet model,
  #    splits the combined output into PART A/B/C, and writes a hash-only audit
  #    item (ADR-002).
  # ---------------------------------------------------------------------------
  GenerateFunction:
    Type: AWS::Lambda::Function
    # Make sure the log group exists before the function (so the first invoke
    # writes into our retention-capped group, not an auto-created one).
    DependsOn: GenerateFunctionLogGroup
    Properties:
      FunctionName: !Sub "${AWS::StackName}-generate"
      Description: >-
        Drafts the discharge summary / GP letter / patient version via Bedrock
        and writes a hash-only audit record. Stores/logs no PHI (ADR-002).
      # Local source dir. `aws cloudformation package` zips it and rewrites this
      # Code property to an S3 location before deploy. No third-party deps
      # (boto3 ships with the runtime), so a plain zip of the dir is enough.
      Code: ../src/generate
      Handler: app.lambda_handler
      Runtime: python3.13
      # Graviton/arm64 is ~20% cheaper per ms than x86 (SAA cost-optimisation),
      # and boto3 is pure-Python so there's nothing arch-specific to worry about.
      Architectures:
        - arm64
      MemorySize: 512
      # Worker runs behind the async 202+poll path (ADR-005), so it has NO API
      # Gateway 30s cap - it can take as long as a generation needs. Cold-eval
      # latencies are 50-83s for the combined call, and Patient v2 adds a second
      # Bedrock pass on top, so a 60s timeout was too tight: longer scenarios were
      # killed mid-generation, leaving the GEN# row stuck 'pending' (surfaced by
      # the Wave 3 canary, 2026-05-30). 240s gives generous headroom for both
      # passes plus cold start, still well under the Lambda 900s ceiling.
      Timeout: 240
      # Our hand-written least-privilege role (table + CMK-via-DDB + one model).
      Role: !GetAtt GenerateFunctionRole.Arn
      # Send logs to the explicit, retention-capped group declared above.
      LoggingConfig:
        LogGroup: !Ref GenerateFunctionLogGroup
      Environment:
        Variables:
          AUDIT_TABLE_NAME: !Ref AuditTable
          # New in slice 4b: the worker writes the actual outputs here for the
          # polling client to fetch. Hash-only audit invariant on AuditTable
          # therefore holds (ADR-002 + ADR-005).
          RESULTS_TABLE_NAME: !Ref ResultsTable
          BEDROCK_MODEL_ID: !Ref ModelId
          # Patient v2 second-pass toggle (off by default; see Parameters +
          # docs/PATIENT_V2_DESIGN.md). The patient prompt ships in the function
          # bundle (src/generate/patient_system_prompt.md); no new IAM is needed
          # because the second pass invokes the SAME pinned model already allowed.
          PATIENT_V2_SECOND_PASS: !Ref PatientV2SecondPass
          # Bumped only when the audit item shape changes (ADR-002 schema_version).
          SCHEMA_VERSION: '1'

  # ===========================================================================
  # SLICE 3 - the tamper-evidence ledger.
  #
  #   AuditTable stream  ->  EventSourceMapping  ->  LedgerFunction  ->  LedgerBucket (WORM)
  #
  # The audit table is already write-once + no-DeleteItem (slices 1-2). This
  # slice adds INDEPENDENT, immutable evidence: every change event is copied to
  # an S3 Object Lock bucket where it cannot be altered or deleted for its
  # retention period. That is what upgrades the THREAT_MODEL claim from "we log
  # usage" to "we can prove the log was not tampered with".
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # 6) The WORM ledger bucket (ADR-002 tamper-evidence control).
  #
  # Object Lock is WORM (write-once-read-many): once an object version is
  # written it is locked for a retention period and cannot be overwritten or
  # deleted. Three things are mandatory for Object Lock and easy to get wrong:
  #   - it can only be turned on at CREATE time (ObjectLockEnabled: true),
  #   - it REQUIRES versioning to be enabled, and
  #   - the lock applies per object VERSION.
  # (SAA: S3 data protection - versioning, Object Lock, retention modes.)
  # ---------------------------------------------------------------------------
  LedgerBucket:
    Type: AWS::S3::Bucket
    # Keep the immutable ledger even if the stack is deleted - vanishing evidence
    # would defeat the point. (For a demo teardown you must wait out the 1-day
    # retention, then empty + delete the bucket by hand.)
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      # Bucket names are GLOBAL; account id + region keep it unique and lowercase.
      BucketName: !Sub "${AWS::StackName}-ledger-${AWS::AccountId}-${AWS::Region}"
      ObjectLockEnabled: true
      VersioningConfiguration:
        Status: Enabled
      ObjectLockConfiguration:
        ObjectLockEnabled: Enabled
        Rule:
          DefaultRetention:
            # GOVERNANCE in demo (deletable only with a special bypass perm we do
            # NOT grant); COMPLIANCE in prod (undeletable even by root till expiry).
            Mode: !If [IsProd, COMPLIANCE, GOVERNANCE]
            Days: !Ref LedgerRetentionDays
      # Encrypt at rest with the SAME customer-managed key as the audit table, so
      # the whole audit domain sits under one auditable, rotating CMK. A Bucket
      # Key collapses per-object KMS calls into one per key/refresh - cheaper and
      # faster (SAA cost-optimisation) with no security trade-off.
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - BucketKeyEnabled: true
            ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !GetAtt AuditKey.Arn
      # Belt-and-braces: this bucket is never public.
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # ---------------------------------------------------------------------------
  # 7) The ledger function's own log group (same rationale as the generate one):
  #    declared explicitly so we can cap retention and scope the role to it.
  # ---------------------------------------------------------------------------
  LedgerFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}-ledger"
      RetentionInDays: 30

  # ---------------------------------------------------------------------------
  # 8) Least-privilege execution role for the ledger consumer. It can do exactly:
  #    a) READ this table's stream      (the 3 stream-data actions, scoped to the
  #       stream ARN; ListStreams cannot be resource-scoped so it stays minimal),
  #    b) s3:PutObject to the ledger    (NO Get/Delete, NO PutObjectRetention,
  #       NO BypassGovernanceRetention - the writer cannot weaken a lock),
  #    c) use the CMK, but ONLY via S3  (kms:ViaService guard), to write SSE-KMS,
  #    d) write to its OWN log group    (no logs:* wildcard).
  # ---------------------------------------------------------------------------
  LedgerFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-ledger-fn-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        # (a) Read the audit table's stream. GetRecords/GetShardIterator/
        #     DescribeStream are scoped to the one stream ARN. ListStreams does
        #     not support resource-level scoping, so it is granted on "*" - the
        #     standard, unavoidable exception for this action.
        - PolicyName: read-audit-stream
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: ReadThisTableStream
                Effect: Allow
                Action:
                  - dynamodb:GetRecords
                  - dynamodb:GetShardIterator
                  - dynamodb:DescribeStream
                Resource: !GetAtt AuditTable.StreamArn
              - Sid: ListStreamsUnscoped
                Effect: Allow
                Action: dynamodb:ListStreams
                Resource: "*"
        # (b) Append to the ledger bucket - PutObject only. The conspicuous
        #     absence of DeleteObject / PutObjectRetention / PutObjectLegalHold /
        #     BypassGovernanceRetention is the point: even this writer cannot
        #     shorten, lift, or bypass a lock it just created.
        - PolicyName: ledger-put-only
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: AppendToLedgerOnly
                Effect: Allow
                Action: s3:PutObject
                Resource: !Sub "${LedgerBucket.Arn}/*"
        # (c) CMK - used in TWO scoped contexts, never as a standalone KMS call:
        #     (i)  via DynamoDB, to DECRYPT the stream records we read - the
        #          audit table is CMK-encrypted, so its stream is encrypted too;
        #     (ii) via S3, to write SSE-KMS objects into the ledger bucket.
        #     Each statement pins kms:ViaService to one service, so this role can
        #     only ever use the key as part of a DynamoDB or S3 request in-region.
        - PolicyName: cmk-via-dynamodb-and-s3-only
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: DecryptStreamViaDynamoDb
                Effect: Allow
                Action:
                  - kms:Decrypt
                Resource: !GetAtt AuditKey.Arn
                Condition:
                  StringEquals:
                    kms:ViaService: !Sub "dynamodb.${AWS::Region}.amazonaws.com"
              - Sid: WriteLedgerViaS3
                Effect: Allow
                Action:
                  - kms:GenerateDataKey
                  - kms:Decrypt
                Resource: !GetAtt AuditKey.Arn
                Condition:
                  StringEquals:
                    kms:ViaService: !Sub "s3.${AWS::Region}.amazonaws.com"
        # (d) Logs - this function's own group only.
        - PolicyName: own-log-group-only
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: WriteOwnLogsOnly
                Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${AWS::StackName}-ledger:*"

  # ---------------------------------------------------------------------------
  # 9) The ledger consumer function. Plain AWS::Lambda::Function (no SAM
  #    transform). Reads stream records, writes each verbatim to the WORM bucket.
  # ---------------------------------------------------------------------------
  LedgerFunction:
    Type: AWS::Lambda::Function
    DependsOn: LedgerFunctionLogGroup
    Properties:
      FunctionName: !Sub "${AWS::StackName}-ledger"
      Description: >-
        Copies every audit-table DynamoDB-stream change event into the S3 Object
        Lock (WORM) ledger. Hash-only data, no PHI (ADR-002 tamper-evidence).
      Code: ../src/ledger
      Handler: app.lambda_handler
      Runtime: python3.13
      Architectures:
        - arm64
      MemorySize: 256
      Timeout: 30
      Role: !GetAtt LedgerFunctionRole.Arn
      LoggingConfig:
        LogGroup: !Ref LedgerFunctionLogGroup
      Environment:
        Variables:
          LEDGER_BUCKET_NAME: !Ref LedgerBucket
          LEDGER_SCHEMA_VERSION: '1'

  # ---------------------------------------------------------------------------
  # 10) Wire the table's stream to the ledger function. The EventSourceMapping is
  #     a poller AWS manages for us: it reads the stream and invokes the function
  #     in batches. (SAA: event-driven, decoupled, poll-based integration - the
  #     producer/DynamoDB never knows the consumer exists.)
  # ---------------------------------------------------------------------------
  LedgerStreamMapping:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn: !GetAtt AuditTable.StreamArn
      FunctionName: !Ref LedgerFunction
      # TRIM_HORIZON = start from the OLDEST record still in the stream, so we
      # also capture events written before this mapping existed (e.g. the slice-2
      # smoke-test row), not just new ones.
      StartingPosition: TRIM_HORIZON
      BatchSize: 10
      MaximumBatchingWindowInSeconds: 5
      # Report only the records that failed so Lambda redrives just those, not
      # the whole batch (the handler returns {"batchItemFailures": [...]}).
      FunctionResponseTypes:
        - ReportBatchItemFailures
      # Don't let one poison record wedge the shard forever.
      MaximumRetryAttempts: 5
      BisectBatchOnFunctionError: true

  # ===========================================================================
  # SLICE 4b - dispatcher + status Lambdas for the async 202+poll pattern.
  #
  # The dispatcher sits in front of the worker (the slice-2 generate Lambda).
  # It writes a pending GEN# audit row, async-invokes the worker via
  # lambda:Invoke (InvocationType='Event'), and returns 202 + job_id to the
  # client - well under 1s, so API Gateway's 30s cap is no longer in play.
  # The status Lambda backs GET /generations/{id}: it reads the GEN# row and
  # (when complete) the ResultsTable row, returning a uniform 404 for unknown
  # OR cross-user jobs (existence not leaked across users).
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # D1) Dispatcher log group + least-privilege role + function.
  # ---------------------------------------------------------------------------
  DispatcherFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}-dispatcher"
      RetentionInDays: 30

  DispatcherFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-dispatcher-fn-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        # (a) AuditTable - PutItem (GEN# + IDEM# rows via TransactWriteItems),
        #     GetItem (idempotency replay lookup), and UpdateItem (flip
        #     pending -> failed if the async worker invoke itself fails before
        #     the worker can mark its own row). Deliberately NO Delete, NO Scan.
        #     The dispatcher only ever transitions pending -> failed, never
        #     pending -> complete - the latter is the worker's job and is
        #     enforced by a ConditionExpression in code.
        - PolicyName: audit-table-dispatch
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: PutGetAndFailedTransitionOnly
                Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                Resource: !GetAtt AuditTable.Arn
        # (b) Worker invocation - exactly ONE function, async only. SAA: this
        #     is the function-to-function invocation pattern, scoped tightly
        #     so the dispatcher can't accidentally call anything else in the
        #     account. Async (InvocationType='Event') is what makes this an
        #     async pattern, not a synchronous chain (which would just push
        #     the 30s problem one Lambda deeper).
        - PolicyName: invoke-worker-only
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: InvokeGenerateWorkerOnly
                Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt GenerateFunction.Arn
        # (c) CMK - usable ONLY when the call flows through DynamoDB (same
        #     pattern as the worker role; the dispatcher only touches the CMK
        #     through table operations).
        - PolicyName: cmk-via-dynamodb-only
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: UseCmkViaDynamoDbOnly
                Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:GenerateDataKey
                  - kms:DescribeKey
                Resource: !GetAtt AuditKey.Arn
                Condition:
                  StringEquals:
                    kms:ViaService: !Sub "dynamodb.${AWS::Region}.amazonaws.com"
        # (d) Own log group only.
        - PolicyName: own-log-group-only
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: WriteOwnLogsOnly
                Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${AWS::StackName}-dispatcher:*"

  DispatcherFunction:
    Type: AWS::Lambda::Function
    DependsOn: DispatcherFunctionLogGroup
    Properties:
      FunctionName: !Sub "${AWS::StackName}-dispatcher"
      Description: >-
        Accepts POST /generate, writes a pending audit row, async-invokes the
        generate worker, returns 202 + job_id. Idempotency-Key enforced via
        TransactWriteItems (ADR-005).
      Code: ../src/dispatcher
      Handler: app.lambda_handler
      Runtime: python3.13
      Architectures:
        - arm64
      MemorySize: 256       # small - it's I/O only, no Bedrock here
      # Tight timeout. The dispatcher does 1 GetItem (optional), 1 transaction,
      # 1 async invoke - all sub-second. A 10s ceiling guards against a wedged
      # DDB call hanging API Gateway. Comfortably under the 29s integration cap.
      Timeout: 10
      Role: !GetAtt DispatcherFunctionRole.Arn
      LoggingConfig:
        LogGroup: !Ref DispatcherFunctionLogGroup
      Environment:
        Variables:
          AUDIT_TABLE_NAME: !Ref AuditTable
          # Pass the worker name (NOT its ARN) - lambda:InvokeFunction works
          # by function name and the role's Resource is the worker's ARN.
          WORKER_FUNCTION_NAME: !Ref GenerateFunction
          IDEM_TTL_HOURS: '24'
          SCHEMA_VERSION: '2'

  # ---------------------------------------------------------------------------
  # D2) Status log group + role + function.
  # ---------------------------------------------------------------------------
  StatusFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}-status"
      RetentionInDays: 30

  StatusFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-status-fn-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        # (a) READ-ONLY on both tables. The status endpoint is strictly a
        #     reader; granting Put/Update/Delete here would be a regression.
        - PolicyName: read-audit-and-results
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: ReadAuditAndResults
                Effect: Allow
                Action:
                  - dynamodb:GetItem
                Resource:
                  - !GetAtt AuditTable.Arn
                  - !GetAtt ResultsTable.Arn
        # (b) CMK via DynamoDB only.
        - PolicyName: cmk-via-dynamodb-only
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: DecryptViaDynamoDb
                Effect: Allow
                Action:
                  - kms:Decrypt
                Resource: !GetAtt AuditKey.Arn
                Condition:
                  StringEquals:
                    kms:ViaService: !Sub "dynamodb.${AWS::Region}.amazonaws.com"
        # (c) Own log group only.
        - PolicyName: own-log-group-only
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: WriteOwnLogsOnly
                Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${AWS::StackName}-status:*"

  StatusFunction:
    Type: AWS::Lambda::Function
    DependsOn: StatusFunctionLogGroup
    Properties:
      FunctionName: !Sub "${AWS::StackName}-status"
      Description: >-
        Backs GET /generations/{id}. Returns job status + (when complete) the
        outputs from the transient ResultsTable. Cross-user reads return 404.
      Code: ../src/status
      Handler: app.lambda_handler
      Runtime: python3.13
      Architectures:
        - arm64
      MemorySize: 256
      Timeout: 5             # two consistent GetItem calls; should be ~50ms warm
      Role: !GetAtt StatusFunctionRole.Arn
      LoggingConfig:
        LogGroup: !Ref StatusFunctionLogGroup
      Environment:
        Variables:
          AUDIT_TABLE_NAME: !Ref AuditTable
          RESULTS_TABLE_NAME: !Ref ResultsTable

  # ===========================================================================
  # SLICE 4a - the authenticated front door.
  #
  #   Clinician browser
  #      | (IdToken in Authorization: Bearer ...)
  #   HTTP API (API Gateway v2) -- JWT authoriser validates the token
  #      |
  #   GenerateFunction (slice 2) -- pulls Cognito 'sub' from the verified claims
  #
  # SAA framing: the JWT authoriser is API Gateway v2's NATIVE way to integrate
  # with Cognito. It verifies the IdToken's signature, issuer (the User Pool
  # URL), audience (the App Client id), and exp BEFORE Lambda is ever invoked.
  # That keeps the hot path single-Lambda (no second "Lambda authoriser" cold
  # start) and removes any "should we re-check the token in the handler?"
  # question - by the time the handler runs, the claims are trusted.
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # 11) Cognito User Pool.
  #
  # The pool is the directory of clinicians who may use the app. Choices baked
  # in here:
  #   - UsernameAttributes: [email]  -> users sign in with email (no separate
  #     username), and AutoVerifiedAttributes makes Cognito send the email-OTP.
  #   - MfaConfiguration: OPTIONAL + TOTP -> we ALLOW TOTP MFA but don't force
  #     it. This is the honest middle ground for a portfolio: the README can
  #     truthfully say "Cognito MFA supported" without making the demo flow
  #     punishing on video. Flipping to "ON" in prod is a one-property change.
  #   - AdminCreateUserConfig.AllowAdminCreateUserOnly: true -> NO public
  #     self-signup. For a demo with synthetic data this is the safe default;
  #     it also means an attacker who finds the API can't simply create an
  #     account and call /generate.
  #   - Password policy: 12 chars, mixed case + number + symbol. Defensible
  #     baseline; lift in prod per NHS DSPT.
  # ---------------------------------------------------------------------------
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub "${AWS::StackName}-users"
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      MfaConfiguration: OPTIONAL
      EnabledMfas:
        - SOFTWARE_TOKEN_MFA   # TOTP (e.g. Authy, Google Authenticator)
      Policies:
        PasswordPolicy:
          MinimumLength: 12
          RequireLowercase: true
          RequireUppercase: true
          RequireNumbers: true
          RequireSymbols: true
          TemporaryPasswordValidityDays: 7
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1
      # Don't email-out PHI even by accident - keep the pool's outbound mail
      # to the default Cognito sender; custom domains/SES are a later concern.
      EmailConfiguration:
        EmailSendingAccount: COGNITO_DEFAULT
      # Tag every pool object with the environment for clean per-env teardown.
      UserPoolTags:
        Environment: !Ref Environment
        Project: ai-discharge-summary

  # ---------------------------------------------------------------------------
  # 12) Public SPA App Client.
  #
  # A SINGLE-PAGE-APP client cannot keep a client secret (the browser would
  # leak it), so GenerateSecret stays false. We enable the auth flows the
  # frontend and our smoke test need:
  #   - ALLOW_USER_SRP_AUTH        -> Amplify's default (sends a derived
  #                                   verifier, never the raw password).
  #   - ALLOW_USER_PASSWORD_AUTH   -> lets a `aws cognito-idp initiate-auth`
  #                                   curl smoke test exchange username+password
  #                                   for tokens without setting up SRP.
  #   - ALLOW_REFRESH_TOKEN_AUTH   -> lets the SPA refresh the IdToken silently
  #                                   so the user isn't bounced every hour.
  # We deliberately do NOT enable ADMIN_USER_PASSWORD (server-side login) or
  # the implicit OAuth grant - this client only speaks the modern auth flows.
  # ---------------------------------------------------------------------------
  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub "${AWS::StackName}-spa"
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      PreventUserExistenceErrors: ENABLED    # don't leak "user not found" vs "wrong password"
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      # Token lifetimes: hours for ID/access, 30 days for refresh - typical SPA
      # defaults. Short enough to limit blast radius if a token leaks, long
      # enough not to log the user out mid-shift.
      AccessTokenValidity: 1
      IdTokenValidity: 1
      RefreshTokenValidity: 30
      TokenValidityUnits:
        AccessToken: hours
        IdToken: hours
        RefreshToken: days
      # Read/write the standard attributes only; we ask Cognito to populate
      # email_verified so the JWT authoriser can rely on it being present.
      ReadAttributes:
        - email
        - email_verified
        - name
      WriteAttributes:
        - email
        - name

  # ---------------------------------------------------------------------------
  # 13) HTTP API (API Gateway v2).
  #
  # Why HTTP API and not REST API: this app is a single Lambda behind a single
  # POST route fronted by a JWT authoriser. HTTP API does that natively,
  # at ~70% lower cost per request and lower latency than REST API, and it is
  # the AWS-recommended default for Lambda + Cognito in 2024+. (See ADR-004 in
  # docs/, added with this slice, for the full trade-off write-up.)
  #
  # CORS: for slice 4a + 4b we allow the Vite dev origin and the curl no-origin
  # case. In slice 4c the React app and the API live behind the SAME CloudFront
  # distribution (S3 origin + API Gateway origin under one hostname), so the
  # browser sees them as same-origin and CORS becomes a no-op - we will tighten
  # AllowOrigins down to that single hostname then.
  # ---------------------------------------------------------------------------
  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub "${AWS::StackName}-http-api"
      ProtocolType: HTTP
      Description: Authenticated front door for the generate Lambda (slice 4a).
      CorsConfiguration:
        AllowOrigins:
          - http://localhost:5173       # vite dev server (slice 4b)
        AllowMethods:
          - POST                        # dispatcher (POST /generate)
          - GET                         # status   (GET /generations/{id})
          - OPTIONS
        AllowHeaders:
          - authorization
          - content-type
          # Idempotency-Key (slice 4b) - a client-supplied UUID the dispatcher
          # uses to dedupe POST retries. Stripe-style API surface.
          - idempotency-key
        MaxAge: 600
      DisableExecuteApiEndpoint: false   # we want the default *.execute-api URL for smoke tests
      Tags:
        Environment: !Ref Environment
        Project: ai-discharge-summary

  # ---------------------------------------------------------------------------
  # 14) JWT Authoriser - the whole point of slice 4a.
  #
  # API Gateway HTTP API verifies the Authorization: Bearer <token> header
  # against this config:
  #   - Issuer  = the Cognito User Pool's public OIDC issuer URL
  #                (https://cognito-idp.<region>.amazonaws.com/<pool-id>)
  #   - Audience = the App Client id  (Cognito puts this in the IdToken's 'aud'
  #                claim, but NOT in the AccessToken - so the client MUST send
  #                the IdToken here, not the access token.)
  #
  # API Gateway downloads the pool's JWKS, verifies the token signature,
  # issuer, audience, and exp, then forwards the verified claims to Lambda
  # under event.requestContext.authorizer.jwt.claims. If verification fails,
  # the request is rejected with 401 - Lambda is never invoked.
  # ---------------------------------------------------------------------------
  JwtAuthorizer:
    Type: AWS::ApiGatewayV2::Authorizer
    Properties:
      ApiId: !Ref HttpApi
      Name: cognito-jwt
      AuthorizerType: JWT
      IdentitySource:
        - "$request.header.Authorization"
      JwtConfiguration:
        Issuer: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}"
        Audience:
          - !Ref UserPoolClient

  # ---------------------------------------------------------------------------
  # 15) Lambda integrations + routes.
  #
  # AWS_PROXY integration with PayloadFormatVersion 2.0:
  #   - the request arrives at Lambda as {headers, body, requestContext, ...}
  #     with requestContext.authorizer.jwt.claims populated by the authoriser,
  #   - the response shape is {statusCode, headers, body} (we return JSON).
  # Both routes are gated by the same JWT authoriser.
  #
  # NOTE on logical IDs (slice 4b):
  #   `GenerateIntegration` is kept as the logical ID even though the target
  #   moved from the slice-4a sync worker to the slice-4b dispatcher. The
  #   logical ID stays so CFN updates IntegrationUri in place rather than
  #   replacing the resource (which would briefly leave POST /generate with no
  #   integration during deploy). The same applies to `GenerateRoute` and
  #   `GenerateInvokePermission` below - they refer to the dispatcher now.
  # ---------------------------------------------------------------------------
  GenerateIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      # SLICE 4b: re-pointed at the dispatcher. The dispatcher is sub-second
      # (writes a row, fires the worker async, returns 202), so the 29s cap
      # below is now slack rather than the binding constraint it was in 4a.
      IntegrationUri: !GetAtt DispatcherFunction.Arn
      IntegrationMethod: POST
      PayloadFormatVersion: '2.0'
      TimeoutInMillis: 29000

  GenerateRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "POST /generate"
      AuthorizationType: JWT
      AuthorizerId: !Ref JwtAuthorizer
      Target: !Sub "integrations/${GenerateIntegration}"

  # ---------------------------------------------------------------------------
  # 15b) Status endpoint - GET /generations/{id} (slice 4b).
  #
  # Same JWT authoriser as POST. The status Lambda enforces scope to the
  # caller's own jobs by reading PK=USER#<jwt.sub>, SK=GEN#<id>; a cross-user
  # call returns 404 (uniform with "no such job") rather than 403 (which would
  # leak that the job exists).
  # ---------------------------------------------------------------------------
  StatusIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt StatusFunction.Arn
      IntegrationMethod: POST          # always POST for AWS_PROXY Lambda integrations
      PayloadFormatVersion: '2.0'
      TimeoutInMillis: 10000           # two consistent GetItems; 10s is generous

  StatusRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "GET /generations/{id}"
      AuthorizationType: JWT
      AuthorizerId: !Ref JwtAuthorizer
      Target: !Sub "integrations/${StatusIntegration}"

  # ---------------------------------------------------------------------------
  # 16) $default stage with AutoDeploy on.
  #
  # AutoDeploy means every Route/Integration change is published to the stage
  # without an explicit Deployment resource - the right ergonomics for an
  # actively iterating slice.
  # ---------------------------------------------------------------------------
  HttpApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: $default
      AutoDeploy: true
      Description: Default stage for the discharge HTTP API.

  # ---------------------------------------------------------------------------
  # 17) Lambda invoke permissions.
  #
  # Resource-based policies on the FUNCTIONS (not on roles) that let API
  # Gateway invoke them. SourceArn is locked to this API + the specific route
  # path, so a different API in the same account couldn't reuse the function.
  #
  # In slice 4b the SourceArn on the POST /generate permission is unchanged
  # (still `/*/*/generate`) but the target FunctionName moved from
  # GenerateFunction (slice 4a) to DispatcherFunction (slice 4b). CFN will
  # replace this permission (FunctionName change forces replacement); during
  # that brief window POST /generate would 500, so we deploy outside business
  # hours when iterating. The worker (GenerateFunction) is now invoked ONLY
  # by the dispatcher's IAM role, not by API Gateway directly, so it no
  # longer carries an API Gateway invoke permission of its own.
  # ---------------------------------------------------------------------------
  GenerateInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref DispatcherFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*/generate"

  # GET /generations/{id} -> StatusFunction. The SourceArn path uses the
  # literal `generations/*` segment (NOT `{id}`) because API Gateway resolves
  # path parameters to wildcards in the permission's SourceArn check.
  StatusInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref StatusFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*/generations/*"

  # ===========================================================================
  # WAVE 3 - synthetic-traffic canary.
  #
  #   EventBridge Scheduler (nightly) -> CanaryFunction -> drives the deployed
  #   async API as the synthetic user -> CloudWatch custom metrics for the
  #   Wave 4 alarms to watch. Design: docs/WAVE3_SYNTHETIC_TRAFFIC_DESIGN.md.
  #
  # The canary holds NO DynamoDB / Bedrock / S3 permissions - it talks only HTTP
  # to the API as a normal signed-in user, so it inherits the same blast radius
  # as any client. Its own permissions are just: read its password from SSM,
  # decrypt that one SecureString, and publish metrics in one namespace.
  # ===========================================================================
  CanaryFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}-canary"
      RetentionInDays: 30

  CanaryFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-canary-fn-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        # (a) Read the synthetic user's password from exactly one SSM parameter.
        - PolicyName: read-canary-password-param
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: GetCanaryPasswordOnly
                Effect: Allow
                Action:
                  - ssm:GetParameter
                Resource: !Sub "arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter${CanaryPasswordParamName}"
        # (b) Decrypt the SecureString - usable ONLY via SSM in this region. The
        #     SecureString uses the account's aws/ssm managed key by default;
        #     the kms:ViaService condition guarantees this role can never use a
        #     key for a standalone KMS call, only as part of an SSM request.
        - PolicyName: decrypt-securestring-via-ssm-only
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: KmsDecryptViaSsmOnly
                Effect: Allow
                Action:
                  - kms:Decrypt
                Resource: "*"
                Condition:
                  StringEquals:
                    kms:ViaService: !Sub "ssm.${AWS::Region}.amazonaws.com"
        # (c) Publish metrics in ONLY the canary namespace. PutMetricData isn't
        #     resource-scopable, so the cloudwatch:namespace condition is the
        #     least-privilege lever. (SAA: condition keys narrow HOW, not WHAT.)
        - PolicyName: put-canary-metrics-only
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: PutMetricDataInNamespaceOnly
                Effect: Allow
                Action:
                  - cloudwatch:PutMetricData
                Resource: "*"
                Condition:
                  StringEquals:
                    cloudwatch:namespace: DischargeAssistant/Canary
        # (d) Sign in as the synthetic user. USER_PASSWORD_AUTH on a public app
        #     client is an unauthenticated Cognito flow; InitiateAuth isn't
        #     meaningfully resource-scopable, so it's granted on "*" - a documented
        #     narrow exception, same posture as dynamodb:ListStreams elsewhere.
        - PolicyName: cognito-initiate-auth
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: InitiateAuthForCanary
                Effect: Allow
                Action:
                  - cognito-idp:InitiateAuth
                Resource: "*"
        # (e) Logs - this function's own log group only.
        - PolicyName: own-log-group-only
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: WriteOwnLogsOnly
                Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${AWS::StackName}-canary:*"

  CanaryFunction:
    Type: AWS::Lambda::Function
    DependsOn: CanaryFunctionLogGroup
    Properties:
      FunctionName: !Sub "${AWS::StackName}-canary"
      Description: >-
        Wave 3 synthetic-traffic canary: replays the 18 eval scenarios through
        the deployed API nightly and emits CloudWatch metrics. No PHI logged.
      Code: ../src/canary
      Handler: app.lambda_handler
      Runtime: python3.13
      Architectures:
        - arm64
      MemorySize: 256
      # Bounded-concurrency run: at most CanaryMaxConcurrency generations in flight
      # at once (avoids saturating the Bedrock on-demand quota). 900s is the Lambda
      # ceiling; CanaryPollTimeoutS (840) leaves shutdown headroom under it.
      Timeout: 900
      Role: !GetAtt CanaryFunctionRole.Arn
      LoggingConfig:
        LogGroup: !Ref CanaryFunctionLogGroup
      Environment:
        Variables:
          API_BASE: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}"
          USER_POOL_CLIENT_ID: !Ref UserPoolClient
          CANARY_USERNAME: !Ref CanaryUsername
          CANARY_PASSWORD_PARAM: !Ref CanaryPasswordParamName
          METRIC_NAMESPACE: DischargeAssistant/Canary
          # Tunable (stack parameters) so quota tuning needs no code change.
          POLL_TIMEOUT_S: !Ref CanaryPollTimeoutS
          CANARY_MAX_CONCURRENCY: !Ref CanaryMaxConcurrency
          CANARY_SCENARIOS: !Ref CanaryScenarios

  # Role the EventBridge Scheduler assumes to invoke the canary. Separate from
  # the function's own execution role (different trust principal).
  CanarySchedulerRole:
    Type: AWS::IAM::Role
    Condition: CanaryOn
    Properties:
      RoleName: !Sub "${AWS::StackName}-canary-scheduler-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: invoke-canary-only
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: InvokeCanaryFunctionOnly
                Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: !GetAtt CanaryFunction.Arn

  # The nightly schedule. EventBridge Scheduler (not a classic Events::Rule) so
  # we get a native IANA timezone - the canary fires at 02:00 Europe/London
  # regardless of BST/GMT, no UTC arithmetic. Created only when CanaryEnabled=on.
  CanaryScheduleRule:
    Type: AWS::Scheduler::Schedule
    Condition: CanaryOn
    Properties:
      Name: !Sub "${AWS::StackName}-canary-nightly"
      Description: Nightly synthetic-traffic run of the discharge-summary canary.
      ScheduleExpression: !Ref CanaryScheduleExpression
      ScheduleExpressionTimezone: Europe/London
      FlexibleTimeWindow:
        Mode: 'OFF'
      State: ENABLED
      Target:
        Arn: !GetAtt CanaryFunction.Arn
        RoleArn: !GetAtt CanarySchedulerRole.Arn

# -----------------------------------------------------------------------------
# Outputs surface the identifiers each slice needs, and double as
# residency/governance evidence.
# -----------------------------------------------------------------------------
Outputs:
  AuditTableName:
    Description: DynamoDB audit table name
    Value: !Ref AuditTable
  AuditTableArn:
    Description: Audit table ARN (scope the Lambda's IAM policy to this)
    Value: !GetAtt AuditTable.Arn
  AuditTableStreamArn:
    Description: Stream ARN - feeds the future tamper-evidence (WORM) consumer
    Value: !GetAtt AuditTable.StreamArn
  AuditKeyArn:
    Description: CMK ARN used for table encryption
    Value: !GetAtt AuditKey.Arn
  GenerateFunctionName:
    Description: Name of the Bedrock-calling generate Lambda (use with `aws lambda invoke`)
    Value: !Ref GenerateFunction
  GenerateFunctionArn:
    Description: ARN of the generate Lambda
    Value: !GetAtt GenerateFunction.Arn
  GenerateFunctionRoleArn:
    Description: Least-privilege execution role ARN (table + CMK-via-DDB + one model)
    Value: !GetAtt GenerateFunctionRole.Arn
  BedrockModelArn:
    Description: The single Bedrock model ARN the function is permitted to invoke
    Value: !Sub "arn:${AWS::Partition}:bedrock:${AWS::Region}::foundation-model/${ModelId}"
  LedgerBucketName:
    Description: WORM (S3 Object Lock) tamper-evidence ledger bucket
    Value: !Ref LedgerBucket
  LedgerBucketArn:
    Description: Ledger bucket ARN (scope the ledger Lambda's PutObject to this)
    Value: !GetAtt LedgerBucket.Arn
  LedgerFunctionName:
    Description: Name of the DynamoDB-stream -> WORM ledger consumer Lambda
    Value: !Ref LedgerFunction
  LedgerFunctionArn:
    Description: ARN of the ledger consumer Lambda
    Value: !GetAtt LedgerFunction.Arn
  LedgerFunctionRoleArn:
    Description: Least-privilege ledger role ARN (stream-read + S3 PutObject + CMK-via-S3)
    Value: !GetAtt LedgerFunctionRole.Arn
  UserPoolId:
    Description: Cognito User Pool id (use with aws cognito-idp admin-create-user)
    Value: !Ref UserPool
  UserPoolArn:
    Description: Cognito User Pool ARN
    Value: !GetAtt UserPool.Arn
  UserPoolClientId:
    Description: Cognito App Client id - this is also the JWT 'aud' the authoriser checks
    Value: !Ref UserPoolClient
  JwtIssuerUrl:
    Description: OIDC issuer URL the JWT authoriser uses to validate tokens
    Value: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}"
  HttpApiId:
    Description: HTTP API id
    Value: !Ref HttpApi
    # Exported so the slice-4c `discharge-web` stack can wire CloudFront
    # against this API. CFN Exports are unique per region+account; the stack
    # name prefix is the standard disambiguator. The export safety lock
    # prevents this stack from removing or changing the output value while
    # another stack ImportValue's it - intentional, stops accidental breakage.
    Export:
      Name: !Sub "${AWS::StackName}-HttpApiId"
  HttpApiEndpoint:
    Description: Default HTTP API endpoint - call POST {endpoint}/generate with Bearer IdToken
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}"
  HttpApiDomain:
    # Same as HttpApiEndpoint but WITHOUT the https:// scheme. CloudFront's
    # Origin.DomainName wants a bare hostname; passing a URL gets you an
    # opaque deploy-time error. Splitting the two outputs is cleaner than
    # asking the web stack to string-strip the scheme via Fn::Join hacks.
    Description: HTTP API hostname (no scheme) - used as the CloudFront origin DomainName
    Value: !Sub "${HttpApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}"
    Export:
      Name: !Sub "${AWS::StackName}-HttpApiDomain"
  # --- Slice 4b additions ---------------------------------------------------
  ResultsTableName:
    Description: Transient outputs table (slice 4b, 24h TTL). NOT part of the audit log.
    Value: !Ref ResultsTable
  ResultsTableArn:
    Description: Results table ARN (scoped on the worker's PutItem + the status Lambda's GetItem)
    Value: !GetAtt ResultsTable.Arn
  DispatcherFunctionName:
    Description: Name of the slice-4b dispatcher (POST /generate -> 202 + job_id)
    Value: !Ref DispatcherFunction
  DispatcherFunctionArn:
    Description: ARN of the dispatcher Lambda
    Value: !GetAtt DispatcherFunction.Arn
  DispatcherFunctionRoleArn:
    Description: Least-privilege dispatcher role (AuditTable PutItem/GetItem + InvokeFunction on worker + CMK via DDB)
    Value: !GetAtt DispatcherFunctionRole.Arn
  StatusFunctionName:
    Description: Name of the slice-4b status Lambda (GET /generations/{id})
    Value: !Ref StatusFunction
  StatusFunctionArn:
    Description: ARN of the status Lambda
    Value: !GetAtt StatusFunction.Arn
  StatusFunctionRoleArn:
    Description: Least-privilege status role (GetItem only on both tables + CMK via DDB)
    Value: !GetAtt StatusFunctionRole.Arn
  CanaryFunctionName:
    Description: Wave 3 synthetic-traffic canary (invoke manually to smoke-test before enabling the schedule)
    Value: !Ref CanaryFunction
  CanaryFunctionArn:
    Description: ARN of the canary Lambda
    Value: !GetAtt CanaryFunction.Arn
  CanaryFunctionRoleArn:
    Description: Least-privilege canary role (SSM GetParameter + KMS-via-SSM decrypt + PutMetricData in one namespace + InitiateAuth)
    Value: !GetAtt CanaryFunctionRole.Arn
